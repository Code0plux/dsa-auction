<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Auction Event</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e11;
    --surface: #17171d;
    --surface2: #1f1f28;
    --border: #2a2a38;
    --accent: #7c6dfa;
    --accent2: #fa6d8c;
    --easy: #4ade80;
    --medium: #facc15;
    --hard: #f87171;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --success: #4ade80;
    --danger: #f87171;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

  header {
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .logo { font-family: var(--mono); font-size: 15px; color: var(--accent); letter-spacing: 0.05em; }
  .logo span { color: var(--accent2); }
  .round-badge { font-family: var(--mono); font-size: 12px; background: var(--surface2); border: 1px solid var(--border); padding: 4px 12px; border-radius: 99px; color: var(--muted); }
  .round-badge b { color: var(--accent); }

  nav { display: flex; gap: 2px; padding: 0 2rem; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 56px; z-index: 99; }
  .nav-btn { padding: 12px 18px; font-size: 13px; font-family: var(--sans); color: var(--muted); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.15s; }
  .nav-btn:hover { color: var(--text); }
  .nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }

  main { padding: 2rem; max-width: 1100px; margin: 0 auto; }
  .page { display: none; }
  .page.active { display: block; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
  }
  .card-title { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; margin-bottom: 1rem; }

  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.25rem; }
  .metric { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; }
  .metric-label { font-size: 11px; color: var(--muted); font-family: var(--mono); letter-spacing: 0.05em; margin-bottom: 6px; }
  .metric-val { font-size: 28px; font-weight: 600; font-family: var(--mono); color: var(--text); }

  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 8px 12px; font-size: 11px; font-family: var(--mono); color: var(--muted); letter-spacing: 0.06em; border-bottom: 1px solid var(--border); }
  td { padding: 11px 12px; font-size: 13px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: var(--surface2); }

  .badge { display: inline-block; padding: 2px 10px; border-radius: 99px; font-size: 11px; font-weight: 600; font-family: var(--mono); }
  .be { background: rgba(74,222,128,0.15); color: var(--easy); border: 1px solid rgba(74,222,128,0.3); }
  .bm { background: rgba(250,204,21,0.15); color: var(--medium); border: 1px solid rgba(250,204,21,0.3); }
  .bh { background: rgba(248,113,113,0.15); color: var(--hard); border: 1px solid rgba(248,113,113,0.3); }
  .bsolved { background: rgba(74,222,128,0.15); color: var(--easy); border: 1px solid rgba(74,222,128,0.3); }
  .bunsolved { background: rgba(248,113,113,0.15); color: var(--hard); border: 1px solid rgba(248,113,113,0.3); }
  .bpending { background: rgba(250,204,21,0.15); color: var(--medium); border: 1px solid rgba(250,204,21,0.3); }
  .bunsold { background: rgba(107,107,128,0.2); color: var(--muted); border: 1px solid var(--border); }

  input, select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }

  .btn { padding: 9px 20px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-family: var(--sans); font-size: 13px; cursor: pointer; transition: all 0.15s; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-accent { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 500; }
  .btn-accent:hover { background: #6a5de8; border-color: #6a5de8; color: #fff; }
  .btn-success { background: rgba(74,222,128,0.1); color: var(--success); border-color: rgba(74,222,128,0.4); }
  .btn-success:hover { background: rgba(74,222,128,0.2); }
  .btn-danger { background: rgba(248,113,113,0.1); color: var(--danger); border-color: rgba(248,113,113,0.4); }
  .btn-danger:hover { background: rgba(248,113,113,0.2); }

  .setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.25rem; }
  .input-group { display: flex; flex-direction: column; gap: 6px; }
  .input-group label { font-size: 11px; font-family: var(--mono); color: var(--muted); letter-spacing: 0.05em; }
  .input-group input, .input-group select { width: 100%; }

  .auction-hero {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem;
    text-align: center;
    margin-bottom: 1rem;
    position: relative;
    overflow: hidden;
  }
  .auction-hero::before {
    content: '';
    position: absolute;
    top: -40px; left: -40px;
    width: 120px; height: 120px;
    background: radial-gradient(circle, rgba(124,109,250,0.15) 0%, transparent 70%);
    border-radius: 50%;
  }
  .prob-title { font-family: var(--mono); font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .prob-sub { font-size: 13px; color: var(--muted); margin-bottom: 1.25rem; display: flex; align-items: center; gap: 10px; justify-content: center; }
  .base-pts { font-family: var(--mono); font-size: 13px; color: var(--accent); background: rgba(124,109,250,0.12); border: 1px solid rgba(124,109,250,0.3); padding: 2px 10px; border-radius: 99px; }
  .bid-row { display: flex; align-items: center; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .current-bid { font-size: 13px; color: var(--muted); margin-top: 10px; }
  .current-bid strong { color: var(--accent); font-family: var(--mono); }

  .bid-log { max-height: 160px; overflow-y: auto; scrollbar-width: thin; }
  .bid-entry { display: flex; justify-content: space-between; padding: 6px 0; font-size: 12px; border-bottom: 1px solid var(--border); }
  .bid-entry:last-child { border-bottom: none; }
  .bid-entry .team-name { color: var(--text); }
  .bid-entry .bid-amount { font-family: var(--mono); color: var(--accent); font-weight: 700; }

  .phase-bar { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 1rem; }
  .phase-pill { padding: 4px 10px; border-radius: 99px; font-size: 11px; font-family: var(--mono); border: 1px solid var(--border); color: var(--muted); }
  .phase-pill.done { background: rgba(74,222,128,0.1); color: var(--easy); border-color: rgba(74,222,128,0.3); }
  .phase-pill.current { background: rgba(124,109,250,0.15); color: var(--accent); border-color: rgba(124,109,250,0.5); font-weight: 700; }

  .winner-banner {
    background: rgba(74,222,128,0.08);
    border: 1px solid rgba(74,222,128,0.3);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    text-align: center;
    color: var(--easy);
    font-weight: 500;
    margin-bottom: 1rem;
  }

  .solve-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 10px; }
  .solve-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; }
  .solve-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .solve-card-name { font-weight: 500; font-size: 13px; }
  .solve-card-meta { font-size: 12px; color: var(--muted); margin-bottom: 10px; line-height: 1.7; }
  .solve-card-meta span { color: var(--accent); font-family: var(--mono); }
  .solve-actions { display: flex; gap: 6px; }
  .solve-actions .btn { flex: 1; padding: 7px; font-size: 12px; text-align: center; }

  .purse-bar-bg { background: var(--surface2); border-radius: 4px; height: 6px; margin-top: 6px; overflow: hidden; border: 1px solid var(--border); }
  .purse-bar-fill { height: 100%; border-radius: 4px; background: var(--accent); transition: width 0.4s; }

  .rank-num { font-family: var(--mono); font-weight: 700; font-size: 15px; color: var(--muted); }
  .rank-1 { color: #fbbf24; }
  .rank-2 { color: #9ca3af; }
  .rank-3 { color: #cd7c3a; }

  .empty-state { text-align: center; padding: 3rem; color: var(--muted); font-size: 13px; }
  .empty-state .big { font-family: var(--mono); font-size: 32px; margin-bottom: 8px; color: var(--border); }

  .team-name-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
  .team-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .team-row input { flex: 1; }
  .team-row .del-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
  .team-row .del-btn:hover { border-color: var(--danger); color: var(--danger); }
  .add-team-btn { display: flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 8px; border: 1px dashed var(--border); background: transparent; color: var(--muted); font-family: var(--sans); font-size: 13px; cursor: pointer; width: 100%; justify-content: center; margin-top: 4px; transition: all 0.15s; }
  .add-team-btn:hover { border-color: var(--accent); color: var(--accent); }

  @media (max-width: 600px) {
    main { padding: 1rem; }
    .metrics { grid-template-columns: repeat(2, 1fr); }
    .setup-grid { grid-template-columns: 1fr; }
    .team-name-grid { grid-template-columns: 1fr; }
    nav { overflow-x: auto; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">DSA<span>_</span>AUCTION</div>
  <div class="round-badge" id="header-round">Round <b>—</b></div>
</header>

<nav>
  <button class="nav-btn active" onclick="gotoPage('setup')">Setup</button>
  <button class="nav-btn" onclick="gotoPage('auction')">Auction</button>
  <button class="nav-btn" onclick="gotoPage('solve')">Solve</button>
  <button class="nav-btn" onclick="gotoPage('scoreboard')">Scoreboard</button>
  <button class="nav-btn" onclick="gotoPage('purse')">Purse</button>
</nav>

<main>

<!-- SETUP -->
<div id="page-setup" class="page active">
  <div class="card">
    <div class="card-title">Event configuration</div>
    <div class="setup-grid" style="grid-template-columns:1fr;margin-bottom:1.25rem">
      <div class="input-group"><label>Starting points per team</label><input type="number" id="start-pts" value="100" min="50" style="max-width:200px"></div>
    </div>
    <div class="card-title">Problem base points</div>
    <div class="setup-grid" style="grid-template-columns:1fr 1fr 1fr;margin-bottom:1.25rem">
      <div class="input-group"><label>Easy (5 problems)</label><input type="number" id="easy-pts" value="30"></div>
      <div class="input-group"><label>Medium (5 problems)</label><input type="number" id="med-pts" value="60"></div>
      <div class="input-group"><label>Hard (5 problems)</label><input type="number" id="hard-pts" value="100"></div>
    </div>
    <div class="card-title" style="margin-bottom:.5rem">Teams <span id="team-count-label" style="color:var(--accent);font-size:11px"></span></div>
    <div id="team-list"></div>
    <button class="add-team-btn" onclick="addTeam()">+ Add team</button>
    <div style="margin-top:1rem;display:flex;align-items:center;gap:10px">
      <button class="btn btn-accent" onclick="initGame()">Start event →</button>
      <span id="setup-error" style="font-size:12px;color:var(--danger)"></span>
    </div>
  </div>
</div>

<!-- AUCTION -->
<div id="page-auction" class="page">
  <div class="phase-bar" id="auction-phase-bar"></div>
  <div id="auction-content"></div>
</div>

<!-- SOLVE -->
<div id="page-solve" class="page">
  <div id="solve-content"></div>
</div>

<!-- SCOREBOARD -->
<div id="page-scoreboard" class="page">
  <div class="metrics" id="score-metrics"></div>
  <div class="card">
    <div class="card-title">Standings</div>
    <table>
      <thead><tr><th>#</th><th>Team</th><th>Points</th><th>Won</th><th>Solved</th><th>Pending</th><th>Unsolved</th></tr></thead>
      <tbody id="score-body"></tbody>
    </table>
  </div>
  <div class="card">
    <div class="card-title">Problem results</div>
    <table>
      <thead><tr><th>Problem</th><th>Diff</th><th>Topic</th><th>Base</th><th>Bid</th><th>Winner</th><th>Status</th></tr></thead>
      <tbody id="prob-body"></tbody>
    </table>
  </div>
</div>

<!-- PURSE -->
<div id="page-purse" class="page">
  <div class="metrics" id="purse-metrics"></div>
  <div class="card">
    <div class="card-title">Team purse breakdown</div>
    <table>
      <thead><tr><th>Team</th><th>Start</th><th>Spent (bids)</th><th>Earned</th><th>Current</th><th>Balance</th></tr></thead>
      <tbody id="purse-body"></tbody>
    </table>
  </div>
</div>

</main>

<script>
const PROBLEMS = [
  // Round 1 — Arrays & Strings
  {id:1,round:1,name:"Reverse an Array",diff:"easy",topic:"Array",desc:"Return a new array with elements in reverse order without using built-in reverse methods.",url:"https://www.hackerrank.com/challenges/arrays-ds/problem"},
  {id:2,round:1,name:"Find the Maximum Element",diff:"easy",topic:"Array",desc:"Traverse an array and return the largest element. Handle single-element arrays as edge cases.",url:"https://www.hackerrank.com/challenges/find-maximum-index-product/problem"},
  {id:3,round:1,name:"Count Vowels in a String",diff:"easy",topic:"String",desc:"Given a string, count and return the number of vowels (a,e,i,o,u) — case insensitive.",url:"https://www.hackerrank.com/challenges/30-running-time-and-complexity/problem"},
  {id:4,round:1,name:"Check Palindrome",diff:"easy",topic:"String",desc:"Determine if a string reads the same forwards and backwards. Ignore spaces and case.",url:"https://www.hackerrank.com/challenges/game-of-thrones-1/problem"},
  {id:5,round:1,name:"Sum of Array Elements",diff:"easy",topic:"Array",desc:"Given an array of N integers, return their total sum. Input can include negative numbers.",url:"https://www.hackerrank.com/challenges/simple-array-sum/problem"},
  {id:6,round:1,name:"Anagram Check",diff:"medium",topic:"String",desc:"Given two strings, determine whether one is an anagram of the other using character frequency counts.",url:"https://www.hackerrank.com/challenges/anagram/problem"},
  {id:7,round:1,name:"Rotate Array by K Positions",diff:"medium",topic:"Array",desc:"Rotate an array to the right by K steps. Handle cases where K is larger than the array length.",url:"https://www.hackerrank.com/challenges/array-left-rotation/problem"},
  {id:8,round:1,name:"Minimum Window Substring",diff:"medium",topic:"Sliding W",desc:"Given strings s and t, find the smallest substring of s that contains all characters of t. Use sliding window.",url:"https://www.hackerrank.com/challenges/sherlock-and-anagrams/problem"},
  {id:9,round:1,name:"Trapping Rain Water",diff:"medium",topic:"Array/DP",desc:"Given an elevation map as an array, compute how much water can be trapped after rain using prefix max arrays.",url:"https://www.hackerrank.com/challenges/two-pluses/problem"},
  {id:10,round:1,name:"Longest Palindromic Substring",diff:"medium",topic:"String/DP",desc:"Find the longest substring that is a palindrome by expanding around every center.",url:"https://www.hackerrank.com/challenges/game-of-thrones-1/problem"},
  {id:11,round:1,name:"Maximum Subarray Sum (Kadane's)",diff:"hard",topic:"Array/DP",desc:"Find the contiguous subarray with the largest sum. Must handle all-negative arrays.",url:"https://www.hackerrank.com/challenges/maxsubarray/problem"},
  {id:12,round:1,name:"Product of Array Except Self",diff:"hard",topic:"Array",desc:"Return an array where each element is the product of all others. Solve without division.",url:"https://www.hackerrank.com/challenges/product-array-puzzle/problem"},
  {id:13,round:1,name:"Smallest Subarray with Sum >= K",diff:"hard",topic:"Sliding W",desc:"Given positive integers and K, find the length of the shortest contiguous subarray with sum >= K.",url:"https://www.hackerrank.com/challenges/crush/problem"},
  {id:14,round:1,name:"Maximum Points on a Line",diff:"hard",topic:"Hash/Math",desc:"Given N points on a 2D plane, find the maximum number that lie on the same straight line using slope hashing.",url:"https://www.hackerrank.com/challenges/sherlock-and-meeting/problem"},
  {id:15,round:1,name:"Minimum Number of Platforms",diff:"hard",topic:"Sort/Greedy",desc:"Given train arrival and departure arrays, find the minimum platforms needed so no train waits.",url:"https://www.hackerrank.com/challenges/string-similarity/problem"},

  // Round 2 — Linked Lists, Stacks & Queues
  {id:16,round:2,name:"Traverse a Linked List",diff:"easy",topic:"LinkedList",desc:"Given the head of a singly linked list, print all node values from head to tail.",url:"https://www.hackerrank.com/challenges/print-the-elements-of-a-linked-list/problem"},
  {id:17,round:2,name:"Find Length of Linked List",diff:"easy",topic:"LinkedList",desc:"Count and return the number of nodes in a given singly linked list.",url:"https://www.hackerrank.com/challenges/get-the-value-of-the-node-at-a-specific-position-from-the-tail/problem"},
  {id:18,round:2,name:"Implement a Stack Using Array",diff:"easy",topic:"Stack",desc:"Build a stack with push, pop, peek, and isEmpty operations using an array.",url:"https://www.hackerrank.com/challenges/maximum-element/problem"},
  {id:19,round:2,name:"Implement a Queue Using Array",diff:"easy",topic:"Queue",desc:"Build a queue with enqueue, dequeue, front, and isEmpty operations using a fixed-size array.",url:"https://www.hackerrank.com/challenges/queue-using-two-stacks/problem"},
  {id:20,round:2,name:"Balanced Parentheses",diff:"easy",topic:"Stack",desc:"Given a string of brackets, determine if every opening bracket has a matching closing bracket in order.",url:"https://www.hackerrank.com/challenges/balanced-brackets/problem"},
  {id:21,round:2,name:"Reverse a Linked List",diff:"medium",topic:"LinkedList",desc:"Reverse a singly linked list in-place and return the new head node.",url:"https://www.hackerrank.com/challenges/reverse-a-linked-list/problem"},
  {id:22,round:2,name:"Detect Loop in Linked List",diff:"medium",topic:"Two Ptr",desc:"Determine if a linked list has a cycle using Floyd's Tortoise and Hare algorithm.",url:"https://www.hackerrank.com/challenges/detect-whether-a-linked-list-contains-a-cycle/problem"},
  {id:23,round:2,name:"Next Greater Element",diff:"medium",topic:"Stack",desc:"For each element in an array, find the next greater element to its right. Return -1 if none exists.",url:"https://www.hackerrank.com/challenges/poisonous-plants/problem"},
  {id:24,round:2,name:"Clone a Linked List with Random Pointer",diff:"medium",topic:"LinkedList",desc:"Deep clone a linked list where each node has next and random pointers. Solve in O(n) without extra space.",url:"https://www.hackerrank.com/challenges/find-the-merge-point-of-two-joined-linked-lists/problem"},
  {id:25,round:2,name:"Largest Rectangle in Histogram",diff:"medium",topic:"Stack/Mono",desc:"Given bar heights, find the area of the largest rectangle that fits within the histogram using monotonic stack.",url:"https://www.hackerrank.com/challenges/largest-rectangle/problem"},
  {id:26,round:2,name:"Merge Two Sorted Linked Lists",diff:"hard",topic:"LinkedList",desc:"Merge two sorted singly linked lists into a single sorted linked list and return its head.",url:"https://www.hackerrank.com/challenges/merge-two-sorted-linked-lists/problem"},
  {id:27,round:2,name:"LRU Cache Implementation",diff:"hard",topic:"Design",desc:"Design a data structure that supports get and put in O(1) using a doubly linked list and hash map.",url:"https://www.hackerrank.com/challenges/largest-rectangle/problem"},
  {id:28,round:2,name:"Min Stack",diff:"hard",topic:"Stack",desc:"Design a stack that supports push, pop, top, and getMin — all in O(1) time complexity.",url:"https://www.hackerrank.com/challenges/maximum-element/problem"},
  {id:29,round:2,name:"Reverse K Nodes in a Linked List",diff:"hard",topic:"LinkedList",desc:"Reverse every K nodes of a linked list in-place. If remaining nodes are fewer than K, leave them as-is.",url:"https://www.hackerrank.com/challenges/reverse-a-linked-list/problem"},
  {id:30,round:2,name:"Maximum Sum Rectangle in 2D Matrix",diff:"hard",topic:"Stack/DP",desc:"Find the submatrix with the largest sum in an M×N matrix. Reduce to Kadane's 1D problem for each column pair.",url:"https://www.hackerrank.com/challenges/maxsubarray/problem"},

  // Round 3 — Recursion, Sorting & Binary Search
  {id:31,round:3,name:"Factorial Using Recursion",diff:"easy",topic:"Recursion",desc:"Compute the factorial of a non-negative integer N using recursion. Handle base case N=0.",url:"https://www.hackerrank.com/challenges/30-running-time-and-complexity/problem"},
  {id:32,round:3,name:"Fibonacci Sequence",diff:"easy",topic:"Recursion",desc:"Return the Nth Fibonacci number using recursion. Identify and handle the base cases correctly.",url:"https://www.hackerrank.com/challenges/functional-programming-warmups-in-recursion---gcd/problem"},
  {id:33,round:3,name:"Linear Search",diff:"easy",topic:"Search",desc:"Implement linear search to find the index of a target in an unsorted array. Return -1 if not found.",url:"https://www.hackerrank.com/challenges/hackerrank-in-a-string/problem"},
  {id:34,round:3,name:"Binary Search",diff:"easy",topic:"Bin Search",desc:"Given a sorted array and a target, implement binary search and return the target's index or -1.",url:"https://www.hackerrank.com/challenges/binary-search/problem"},
  {id:35,round:3,name:"Bubble Sort",diff:"easy",topic:"Sorting",desc:"Sort an array of integers using the bubble sort algorithm. Return the sorted array.",url:"https://www.hackerrank.com/challenges/correctness-and-the-loop-invariant/problem"},
  {id:36,round:3,name:"Find First and Last Position",diff:"medium",topic:"Bin Search",desc:"Given a sorted array with duplicates, find the first and last index of a given target using binary search.",url:"https://www.hackerrank.com/challenges/tutorial-intro/problem"},
  {id:37,round:3,name:"Merge Sort",diff:"medium",topic:"Sort/Rec",desc:"Implement merge sort on an array. Focus on the divide, conquer, and merge steps clearly.",url:"https://www.hackerrank.com/challenges/merge-sort/problem"},
  {id:38,round:3,name:"Search in Rotated Sorted Array",diff:"medium",topic:"Bin Search",desc:"Find a target in a sorted array that has been rotated at an unknown pivot. Use binary search.",url:"https://www.hackerrank.com/challenges/binary-search/problem"},
  {id:39,round:3,name:"Count Inversions in Array",diff:"medium",topic:"Sort/Rec",desc:"Count the number of pairs (i,j) where i < j but arr[i] > arr[j]. Use a modified merge sort.",url:"https://www.hackerrank.com/challenges/merge-sort/problem"},
  {id:40,round:3,name:"Allocate Minimum Pages",diff:"medium",topic:"Bin Search",desc:"Divide N books among M students to minimize the maximum pages any student reads. Binary search on answer space.",url:"https://www.hackerrank.com/challenges/minimum-loss/problem"},
  {id:41,round:3,name:"Subsets / Power Set",diff:"hard",topic:"Backtrack",desc:"Generate all possible subsets of a given array using recursion or bit manipulation.",url:"https://www.hackerrank.com/challenges/recursive-digit-sum/problem"},
  {id:42,round:3,name:"Median of Two Sorted Arrays",diff:"hard",topic:"Bin Search",desc:"Find the median of two sorted arrays combined, in O(log(min(m,n))) time using binary search.",url:"https://www.hackerrank.com/challenges/find-the-median/problem"},
  {id:43,round:3,name:"Kth Largest Element",diff:"hard",topic:"D&C",desc:"Find the Kth largest element in an unsorted array using QuickSelect without full sorting.",url:"https://www.hackerrank.com/challenges/quicksort1/problem"},
  {id:44,round:3,name:"Word Search in a Grid",diff:"hard",topic:"Backtrack/DFS",desc:"Given a 2D character grid and a word, determine if the word exists by traversing adjacent cells without reuse.",url:"https://www.hackerrank.com/challenges/morgan-and-a-string/problem"},
  {id:45,round:3,name:"Kth Smallest in Sorted Matrix",diff:"hard",topic:"Bin Search",desc:"Given a sorted matrix (each row and column sorted), find the Kth smallest element using binary search on value range.",url:"https://www.hackerrank.com/challenges/minimum-loss/problem"}
];

let state = null;

function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

let teamList = ['Team 1', 'Team 2', 'Team 3', 'Team 4'];

function renderTeamList() {
  const c = document.getElementById('team-list');
  const label = document.getElementById('team-count-label');
  if(label) label.textContent = `(${teamList.length})`;
  c.innerHTML = '';
  teamList.forEach((name, i) => {
    const row = document.createElement('div');
    row.className = 'team-row';
    row.innerHTML = `
      <span style="font-family:var(--mono);font-size:11px;color:var(--muted);min-width:22px">${String(i+1).padStart(2,'0')}</span>
      <input type="text" value="${name}" placeholder="Team name" oninput="teamList[${i}]=this.value">
      <button class="del-btn" onclick="removeTeam(${i})" title="Remove">×</button>`;
    c.appendChild(row);
  });
}

function addTeam() {
  teamList.push(`Team ${teamList.length + 1}`);
  renderTeamList();
}

function removeTeam(i) {
  if(teamList.length <= 2) { document.getElementById('setup-error').textContent = 'Minimum 2 teams required.'; return; }
  document.getElementById('setup-error').textContent = '';
  teamList.splice(i, 1);
  renderTeamList();
}

renderTeamList();

function initGame(){
  const startPts = parseInt(document.getElementById('start-pts').value)||100;
  const easyPts = parseInt(document.getElementById('easy-pts').value)||30;
  const medPts = parseInt(document.getElementById('med-pts').value)||60;
  const hardPts = parseInt(document.getElementById('hard-pts').value)||100;
  if(teamList.length < 2){ document.getElementById('setup-error').textContent='Add at least 2 teams.'; return; }
  const emptyName = teamList.findIndex(n=>!n.trim());
  if(emptyName!==-1){ document.getElementById('setup-error').textContent=`Team ${emptyName+1} has no name.`; return; }
  document.getElementById('setup-error').textContent='';
  const teams = teamList.map(nm=>({name:nm.trim(),points:startPts,startPts,spent:0,earned:0,wonProblems:[]}));
  const basePts = {easy:easyPts,medium:medPts,hard:hardPts};
  const allProblems = PROBLEMS.map(p=>({...p,bankRound:p.round,basePts:basePts[p.diff],auctionRound:null,bidAmount:0,winner:null,status:'unsold'}));
  state = {teams,basePts,startPts,allProblems,round:1,phase:'auction',currentAuctionIdx:0,auctionPool:[],bidLog:[]};
  startRound(1);
  gotoPage('auction');
}

function startRound(r){
  state.round = r;
  state.phase = 'auction';
  const pool = shuffle(state.allProblems.filter(p=>p.bankRound===r));
  state.auctionPool = pool;
  state.currentAuctionIdx = 0;
  state.bidLog = [];
  updateHeaderRound();
}

function updateHeaderRound(){
  const el = document.getElementById('header-round');
  if(state) el.innerHTML = `Round <b>${state.round}</b>`;
  else el.innerHTML = `Round <b>—</b>`;
}

function currentProblem(){
  if(!state||state.currentAuctionIdx>=state.auctionPool.length) return null;
  return state.auctionPool[state.currentAuctionIdx];
}

function gotoPage(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  const pages = ['setup','auction','solve','scoreboard','purse'];
  document.querySelectorAll('.nav-btn')[pages.indexOf(p)].classList.add('active');
  if(p==='auction') renderAuction();
  if(p==='solve') renderSolve();
  if(p==='scoreboard') renderScoreboard();
  if(p==='purse') renderPurse();
}

function renderAuction(){
  if(!state){document.getElementById('auction-content').innerHTML='<div class="empty-state"><div class="big">[ ]</div>Set up the event first.</div>';return;}
  const pb = document.getElementById('auction-phase-bar');
  pb.innerHTML = '';
  state.auctionPool.forEach((p,i)=>{
    const d = document.createElement('div');
    d.className = 'phase-pill'+(i<state.currentAuctionIdx?' done':i===state.currentAuctionIdx?' current':'');
    const label = p.diff==='easy'?'E':p.diff==='medium'?'M':'H';
    d.textContent = label+(i+1);
    pb.appendChild(d);
  });

  const box = document.getElementById('auction-content');
  if(state.phase==='solving'){
    box.innerHTML=`<div class="winner-banner">All ${state.auctionPool.length} problems auctioned! Go to Solve tab.</div>
    <button class="btn btn-accent" onclick="gotoPage('solve')">Go to Solve →</button>`;
    return;
  }
  const prob = currentProblem();
  if(!prob){state.phase='solving';renderAuction();return;}

  const diffClass = prob.diff==='easy'?'be':prob.diff==='medium'?'bm':'bh';
  const topBid = state.bidLog.length?state.bidLog[state.bidLog.length-1]:null;
  const minBid = topBid?topBid.amount+1:1;
  const teamOpts = state.teams.map((t,i)=>`<option value="${i}">${t.name} (${t.points} pts)</option>`).join('');
  const bidsHtml = state.bidLog.length
    ? [...state.bidLog].reverse().map(b=>`<div class="bid-entry"><span class="team-name">${b.team}</span><span class="bid-amount">${b.amount} pts</span></div>`).join('')
    : '<div style="color:var(--muted);font-size:12px;padding:6px 0">No bids yet</div>';

  box.innerHTML=`
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <span style="font-family:var(--mono);font-size:12px;color:var(--muted)">ROUND ${state.round} &nbsp;·&nbsp; Problem ${state.currentAuctionIdx+1} / ${state.auctionPool.length}</span>
    </div>
    <div class="auction-hero">
      <div class="prob-title">${prob.name}</div>
      <div class="prob-sub">
        <span class="badge ${diffClass}">${prob.diff}</span>
        <span style="font-size:11px;background:rgba(107,107,128,0.2);padding:2px 8px;border-radius:99px;color:var(--muted)">${prob.topic}</span>
        <span class="base-pts">${prob.basePts} base pts</span>
      </div>
      <div style="font-size:12px;color:var(--muted);max-width:520px;margin:0 auto 1rem;line-height:1.6">${prob.desc}</div>
      <a href="${prob.url}" target="_blank" style="font-size:11px;color:var(--accent);text-decoration:none;font-family:var(--mono)">Open on HackerRank →</a>
      <div style="margin-top:1rem"></div>
      <div class="bid-row">
        <select id="bid-team">${teamOpts}</select>
        <input type="number" id="bid-amt" min="${minBid}" value="${minBid}" style="width:100px">
        <button class="btn btn-accent" onclick="placeBid()">Place bid</button>
      </div>
      <div class="current-bid">${topBid?`Highest: <strong>${topBid.team}</strong> — <strong>${topBid.amount} pts</strong>`:'No bids yet — start the auction!'}</div>
    </div>
    <div class="card-title">Bid history</div>
    <div class="bid-log">${bidsHtml}</div>
    <div style="display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap">
      <button class="btn btn-success" onclick="sellProblem()">Sell to highest bidder</button>
      <button class="btn" onclick="skipProblem()">Pass / no sale</button>
    </div>
  </div>`;
}

function placeBid(){
  if(!state)return;
  const ti = parseInt(document.getElementById('bid-team').value);
  const amt = parseInt(document.getElementById('bid-amt').value)||0;
  const team = state.teams[ti];
  const topBid = state.bidLog.length?state.bidLog[state.bidLog.length-1]:null;
  if(amt<1){alert('Bid must be at least 1');return;}
  if(topBid&&amt<=topBid.amount){alert(`Bid must be higher than current top (${topBid.amount})`);return;}
  if(amt>team.points){alert(`${team.name} only has ${team.points} points!`);return;}
  state.bidLog.push({team:team.name,teamIdx:ti,amount:amt});
  renderAuction();
}

function sellProblem(){
  if(!state||!state.bidLog.length){alert('No bids placed! Use Pass to skip.');return;}
  const top = state.bidLog[state.bidLog.length-1];
  const prob = currentProblem();
  prob.winner = top.teamIdx;
  prob.bidAmount = top.amount;
  prob.status = 'pending';
  prob.auctionRound = state.round;
  state.teams[top.teamIdx].points -= top.amount;
  state.teams[top.teamIdx].spent += top.amount;
  state.teams[top.teamIdx].wonProblems.push(prob.id);
  state.currentAuctionIdx++;
  state.bidLog = [];
  renderAuction();
}

function skipProblem(){
  if(!state)return;
  const prob = currentProblem();
  prob.status = 'unsold';
  prob.auctionRound = state.round;
  state.currentAuctionIdx++;
  state.bidLog = [];
  renderAuction();
}

function renderSolve(){
  if(!state){document.getElementById('solve-content').innerHTML='<div class="empty-state"><div class="big">[ ]</div>Set up the event first.</div>';return;}
  const pending = state.allProblems.filter(p=>p.status==='pending'&&p.auctionRound===state.round);
  const done = state.allProblems.filter(p=>(p.status==='solved'||p.status==='unsolved')&&p.auctionRound===state.round);
  let html = `<div class="card" style="margin-bottom:1rem">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div style="font-family:var(--mono);font-size:13px">Round ${state.round} &nbsp;·&nbsp; Mark solve results</div>
      <span class="badge bpending">${pending.length} pending</span>
    </div>`;
  if(pending.length===0&&state.phase==='solving'){
    html+=`<div class="winner-banner" style="margin-top:1rem">All problems marked! Round ${state.round} complete.</div>`;
    if(state.round<3){
      html+=`<button class="btn btn-accent" onclick="nextRound()">Start Round ${state.round+1} →</button>`;
    } else {
      html+=`<button class="btn btn-success" onclick="gotoPage('scoreboard')">View final scoreboard →</button>`;
    }
  }
  html+=`</div>`;

  if(pending.length){
    html+=`<div class="solve-grid">`;
    pending.forEach(p=>{
      const winner = state.teams[p.winner];
      const diffClass = p.diff==='easy'?'be':p.diff==='medium'?'bm':'bh';
      const reward = p.basePts+p.bidAmount;
      html+=`<div class="solve-card">
        <div class="solve-card-header">
          <span class="solve-card-name">${p.name}</span>
          <span class="badge ${diffClass}">${p.diff}</span>
        </div>
        <div class="solve-card-meta">
          Won by: ${winner.name}<br>
          Bid: <span>${p.bidAmount}</span> pts &nbsp;|&nbsp; Base: <span>${p.basePts}</span> pts<br>
          Reward if solved: <span>${reward}</span> pts
        </div>
        <div class="solve-actions">
          <button class="btn btn-success" onclick="markSolved(${p.id})">Solved</button>
          <button class="btn btn-danger" onclick="markUnsolved(${p.id})">Not solved</button>
        </div>
      </div>`;
    });
    html+=`</div>`;
  }

  if(done.length){
    html+=`<div class="card" style="margin-top:1rem"><div class="card-title">Marked results</div><div class="solve-grid">`;
    done.forEach(p=>{
      const winner = p.winner!==null?state.teams[p.winner]:null;
      const statusClass = p.status==='solved'?'bsolved':'bunsolved';
      const diffClass = p.diff==='easy'?'be':p.diff==='medium'?'bm':'bh';
      html+=`<div class="solve-card" style="opacity:.6">
        <div class="solve-card-header">
          <span style="font-size:13px">${p.name}</span>
          <span class="badge ${diffClass}">${p.diff}</span>
        </div>
        <div class="solve-card-meta">${winner?winner.name:'—'}</div>
        <span class="badge ${statusClass}">${p.status}</span>
      </div>`;
    });
    html+=`</div></div>`;
  }

  document.getElementById('solve-content').innerHTML = html;
}

function markSolved(id){
  const p = state.allProblems.find(x=>x.id===id);
  p.status = 'solved';
  const reward = p.basePts+p.bidAmount;
  state.teams[p.winner].points += reward;
  state.teams[p.winner].earned += reward;
  checkSolveComplete();
  renderSolve();
}

function markUnsolved(id){
  state.allProblems.find(x=>x.id===id).status = 'unsolved';
  checkSolveComplete();
  renderSolve();
}

function checkSolveComplete(){
  const pending = state.allProblems.filter(p=>p.status==='pending'&&p.auctionRound===state.round);
  if(pending.length===0) state.phase = 'solving';
}

function nextRound(){
  startRound(state.round+1);
  gotoPage('auction');
}

function renderScoreboard(){
  if(!state){document.getElementById('score-metrics').innerHTML='';document.getElementById('score-body').innerHTML='<tr><td colspan="7" style="text-align:center;color:var(--muted)">No data</td></tr>';return;}
  const auctioned = state.allProblems.filter(p=>p.winner!==null);
  const solved = state.allProblems.filter(p=>p.status==='solved');
  document.getElementById('score-metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Round</div><div class="metric-val">${state.round}</div></div>
    <div class="metric"><div class="metric-label">Teams</div><div class="metric-val">${state.teams.length}</div></div>
    <div class="metric"><div class="metric-label">Auctioned</div><div class="metric-val">${auctioned.length}</div></div>
    <div class="metric"><div class="metric-label">Solved</div><div class="metric-val">${solved.length}</div></div>`;
  const sorted = [...state.teams].map((t,i)=>({...t,idx:i})).sort((a,b)=>b.points-a.points);
  const rankClass = (i)=>i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'';
  document.getElementById('score-body').innerHTML = sorted.map((t,i)=>{
    const won = state.allProblems.filter(p=>p.winner===t.idx);
    const solvedN = won.filter(p=>p.status==='solved').length;
    const pending = won.filter(p=>p.status==='pending').length;
    const unsolved = won.filter(p=>p.status==='unsolved').length;
    return `<tr>
      <td><span class="rank-num ${rankClass(i)}">${i===0?'01':i===1?'02':i===2?'03':'0'+(i+1)}</span></td>
      <td><strong>${t.name}</strong></td>
      <td><strong style="font-family:var(--mono);color:var(--accent)">${t.points}</strong></td>
      <td>${won.length}</td><td>${solvedN}</td><td>${pending}</td><td>${unsolved}</td>
    </tr>`;
  }).join('');
  document.getElementById('prob-body').innerHTML = state.allProblems.filter(p=>p.auctionRound!==null).map(p=>{
    const winner = p.winner!==null?state.teams[p.winner].name:'—';
    const diffClass = p.diff==='easy'?'be':p.diff==='medium'?'bm':'bh';
    const statusClass = p.status==='solved'?'bsolved':p.status==='unsolved'?'bunsolved':p.status==='pending'?'bpending':'bunsold';
    return `<tr>
      <td><a href="${p.url}" target="_blank" style="color:var(--accent);text-decoration:none">${p.name}</a></td>
      <td><span class="badge ${diffClass}">${p.diff}</span></td>
      <td style="font-size:11px;color:var(--muted)">${p.topic}</td>
      <td style="font-family:var(--mono)">${p.basePts}</td>
      <td style="font-family:var(--mono)">${p.bidAmount||'—'}</td>
      <td>${winner}</td>
      <td><span class="badge ${statusClass}">${p.status}</span></td>
    </tr>`;
  }).join('');
}

function renderPurse(){
  if(!state){document.getElementById('purse-body').innerHTML='';return;}
  const maxPts = Math.max(...state.teams.map(t=>t.points));
  document.getElementById('purse-metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Total points in play</div><div class="metric-val">${state.teams.reduce((s,t)=>s+t.points,0)}</div></div>
    <div class="metric"><div class="metric-label">Total spent</div><div class="metric-val">${state.teams.reduce((s,t)=>s+t.spent,0)}</div></div>
    <div class="metric"><div class="metric-label">Total earned</div><div class="metric-val">${state.teams.reduce((s,t)=>s+t.earned,0)}</div></div>
    <div class="metric"><div class="metric-label">Richest team</div><div class="metric-val">${maxPts}</div></div>`;
  document.getElementById('purse-body').innerHTML = state.teams.map((t)=>{
    const pct = Math.round((t.points/t.startPts)*100);
    const barW = Math.max(0,Math.min(100,Math.round((t.points/Math.max(t.startPts,...state.teams.map(x=>x.points)))*100)));
    return `<tr>
      <td><strong>${t.name}</strong></td>
      <td style="font-family:var(--mono)">${t.startPts}</td>
      <td style="font-family:var(--mono);color:var(--danger)">${t.spent}</td>
      <td style="font-family:var(--mono);color:var(--success)">${t.earned}</td>
      <td style="font-family:var(--mono);font-size:15px;color:var(--accent)"><strong>${t.points}</strong></td>
      <td style="min-width:140px">
        <div style="font-size:11px;color:var(--muted);margin-bottom:3px;font-family:var(--mono)">${pct}%</div>
        <div class="purse-bar-bg"><div class="purse-bar-fill" style="width:${barW}%"></div></div>
      </td>
    </tr>`;
  }).join('');
}
</script>
</body>
</html>
